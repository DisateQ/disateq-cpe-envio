# ============================================================
#  DisateQ Bridge(tm) — Configuracion
#  Archivo: bridge_config.ini
#  Ubicacion: D:\DisateQ\Bridge\bridge_config.ini
# ============================================================

[EMPRESA]
ruc              = 
razon_social     = 
nombre_comercial = 
serie_boleta     = B001
serie_factura    = F001
serie_nota       = NC01

[ENVIO]
# Modalidad de envio: OSE  o  SEE
#   OSE  — via Operador de Servicios Electronicos / PSE
#   SEE  — via Sistema de Emision Electronica SUNAT
modalidad = OSE

# Modo de generacion: legacy (TXT)  o  json
modo = legacy

# ── Endpoints OSE / PSE ──────────────────────────────────────
# Cambiar estas URLs para usar otro proveedor distinto a APIFAS.
url_ose_envio     = https://apifas.disateq.com/ose_produccion.php
url_ose_anulacion = https://apifas.disateq.com/ose_anular.php

# ── Endpoints SEE SUNAT ──────────────────────────────────────
url_see_envio     = https://apifas.disateq.com/produccion_text.php
url_see_anulacion = https://apifas.disateq.com/produccion_anular.php

[RUTAS]
# Ruta donde el sistema legacy guarda los archivos DBF
data_dbf   = C:\Sistemas\data

# Ruta donde DisateQ Bridge guarda los TXT generados
salida_txt = D:\DisateQ\Bridge

[SEGURIDAD]
# PIN de 4 digitos — protege el acceso a esta configuracion
pin = 

[CORRELATIVO]
# Ultimo numero YA ENVIADO a SUNAT por serie.
# DisateQ Bridge ignora todo comprobante con numero <= a este valor.
# Dejar en 0 para procesar todo desde el inicio (instalacion nueva).
# Ejemplo:
#   B001 = 22180
#   F001 = 1045
